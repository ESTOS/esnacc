<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<title>MicroService Test Client</title>
		<link rel="stylesheet" href="sampleclient.css" type="text/css" />

		<!-- Hide body until cookie values are restored to avoid flicker -->
		<style>
		body {
			visibility: hidden;
		}

		/* ── Log entry layout ─────────────────────────────────────── */

		#result {
			font-family: monospace;
			padding-bottom: 10px;
		}

		.log-entry {
			/* each entry is its own block; no extra margin so it stays compact */
		}

		.log-entry__line {
			display: flex;
			align-items: baseline;
			gap: 4px;
			/* wrap long lines but keep the toggle button pinned to the left */
			flex-wrap: nowrap;
		}

		/*
		 * The expand/collapse toggle button.
		 * Rendered BEFORE the timestamp in every entry that carries metadata.
		 */
		.log-toggle {
			flex: 0 0 auto; /* never grows or shrinks */
			width: 15px;
			text-align: center;
			line-height: 1;
			padding: 1px 2px;
			cursor: pointer;
			border: 1px solid #bbb;
			border-radius: 2px;
			background: #f5f5f5;
			color: #555;
			user-select: none;
			/* keep it vertically centred with the first line of text */
			align-self: center;
		}
		.log-toggle:hover {
			background: #e0e0e0;
			border-color: #888;
		}

		/*
		 * Invisible spacer used for entries that have NO metadata.
		 * Keeps timestamps horizontally aligned across all entries.
		 */
		.log-toggle--empty {
			cursor: default;
			border: 1px transparent;
		}

		/* The expandable metadata block */
		.log-meta {
			margin: 2px 0 4px calc(1.4em + 4px + 4px); /* indent under the toggle */
			border-left: 2px solid #ccc;
			padding-left: 6px;
		}
		.log-meta pre {
			margin: 0;
			white-space: pre-wrap;
			word-break: break-word;
			color: #333;
		}
		</style>
		<script>
		(function() {
				const COOKIE_NAME = "mstcSettings";
				const match = document.cookie.split("; ").find((row) => row.startsWith(COOKIE_NAME + "="));

				function restore() {
					if (match) {
						let data;
						try {
							data = JSON.parse(decodeURIComponent(match.split("=").slice(1).join("=")));
						} catch {}
						if (data) {
							const set = (id, prop, val) => {
								if (val === undefined)
									return;
								const el = document.getElementById(id);
								if (el)
									el[prop] = val;
							};
							set("encoding", "value", data.encoding);
							set("transport", "value", data.transport);
							set("loglevel", "value", data.loglevel);
							set("autoreconnect", "checked", data.autoreconnect);
						}
					}
					document.body.style.visibility = "visible";
				}

				if (document.readyState === "loading")
					document.addEventListener("DOMContentLoaded", restore, { once: true });
				else
					restore();
			})();
		</script>

		<script type="module" src="/@vite/client"></script>
		<script type="module" src="/src/client.ts"></script>
		<script type="module">
		import { eventManager, settingsManager, theClient } from "/src/client.ts";
			import {
				AsnCreateFancyEventsArgument,
				AsnCreateFancyEventsResult,
			} from "/src/stub/ENetUC_Event_Manager.ts";
			import {
				AsnGetSettingsArgument,
				AsnGetSettingsResult,
				AsnSetSettingsArgument,
				AsnSetSettingsResult,
			} from "/src/stub/ENetUC_Settings_Manager.ts";

			// ── Cookie helpers ──────────────────────────────────────────────
			const COOKIE_NAME = "mstcSettings";
			const COOKIE_DAYS = 365;
			let lastAutoReconnect = false;
			let loading = true;

			function saveCookies() {
				if (loading)
					return;
				const data = {
					encoding: document.getElementById("encoding")?.value,
					transport: document.getElementById("transport")?.value,
					loglevel: document.getElementById("loglevel")?.value,
					autoreconnect: document.getElementById("autoreconnect")?.checked,
				};
				const expires = new Date(Date.now() + COOKIE_DAYS * 864e5).toUTCString();
				document.cookie = `${COOKIE_NAME}=${
					encodeURIComponent(JSON.stringify(data))
				}; expires=${expires}; path=/`;
			}

			// ───────────────────────────────────────────────────────────────

			settingsManager.onEvent_asnSettingsChanged = (argument, invokeContext) => {
				if (argument.settings.bEnabled !== undefined) {
					const enabled = document.getElementById("enabled");
					if (enabled)
						enabled.checked = argument.settings.bEnabled;
				}
				if (argument.settings.u8sUsername !== undefined) {
					const username = document.getElementById("username");
					if (username)
						username.value = argument.settings.u8sUsername;
				}
			};

			eventManager.onEvent_asnFancyEvent = (argument, invokeContext) => {
			};

			function encoding_changed() {
				const encoding = document.getElementById("encoding");
				if (encoding)
					theClient.setEncoding(parseInt(encoding.value));
				saveCookies();
			}
			function transport_changed() {
				const transport = document.getElementById("transport");
				if (transport) {
					theClient.setTransport(transport.value);
					updateTarget();
				}
				if (!loading) {
					const autoreconnect = document.getElementById("autoreconnect");
					if (autoreconnect) {
						const bIsRest = transport?.value === "REST";
						autoreconnect.disabled = bIsRest;
						if (bIsRest) {
							lastAutoReconnect = autoreconnect.checked;
							autoreconnect.checked = false;
						} else {
							autoreconnect.checked = lastAutoReconnect;
						}
					}
					saveCookies();
				}
			}
			async function getEvents() {
				const amount = document.getElementById("amount");
				const delay = document.getElementById("delay");
				if (amount && delay) {
					const argument = new AsnCreateFancyEventsArgument({
						iEventCount: parseInt(amount.value, 10),
						iEventDelay: parseInt(delay.value, 10),
					});
					const response = await eventManager.invoke_asnCreateFancyEvents(argument);
					theClient.getResult(response, AsnCreateFancyEventsResult);
				}
			}
			async function getSettings() {
				const argument = new AsnGetSettingsArgument();
				const response = await settingsManager.invoke_asnGetSettings(argument);
				const result = theClient.getResult(response, AsnGetSettingsResult);
				if (result) {
					const enabled = document.getElementById("enabled");
					if (enabled)
						enabled.checked = result.settings.bEnabled;
					const username = document.getElementById("username");
					if (username)
						username.value = result.settings.u8sUsername;
				}
			}
			async function setSettings() {
				const enabled = document.getElementById("enabled");
				const username = document.getElementById("username");
				if (enabled && username) {
					const argument = new AsnSetSettingsArgument({
						settings: { bEnabled: enabled.checked, u8sUsername: username.value },
					});
					const response = await settingsManager.invoke_asnSetSettings(argument);
					theClient.getResult(response, AsnSetSettingsResult);
				}
			}
			function clearLog() {
				theClient.clearLog();
			}
			function loglevel_changed() {
				const loglevel = document.getElementById("loglevel");
				if (loglevel)
					theClient.loglevel = parseInt(loglevel.value);
				saveCookies();
			}
			function updateTarget() {
				const ahref = document.getElementById("target");
				if (ahref) {
					ahref.textContent = theClient.getTarget();
					ahref.href = theClient.getTarget();
				}
			}
			async function dropConnection() {
				theClient.disconnect();
			}

			function autoreconnect_changed() {
				const autoreconnect = document.getElementById("autoreconnect");
				if (autoreconnect)
					theClient.setAutoReconnect(autoreconnect.checked);
				saveCookies();
			}

			window.encoding_changed = encoding_changed;
			window.transport_changed = transport_changed;
			window.getEvents = getEvents;
			window.getSettings = getSettings;
			window.setSettings = setSettings;
			window.clearLog = clearLog;
			window.dropConnection = dropConnection;
			window.loglevel_changed = loglevel_changed;
			window.autoreconnect_changed = autoreconnect_changed;

			window.onload = function() {
				autoreconnect_changed();
				encoding_changed();
				transport_changed();
				loglevel_changed();
				updateTarget();
				loading = false;
			};
		</script>
	</head>

	<body>
		<form>
			<h3>Welcome to the microservice test client</h3>
			<h4>General section:</h4>
			Encoding:
			<select id="encoding" onchange="encoding_changed()" style="margin-right: 10px">
				<option value="1">JSON</option>
				<option value="2">BER</option>
			</select>
			Transport:
			<select id="transport" onchange="transport_changed()" style="margin-right: 10px">
				<option value="REST">REST</option>
				<option value="WEBSOCKET">WebSocket</option>
			</select>
			Auto reconnect:
			<input
				type="checkbox"
				id="autoreconnect"
				onchange="autoreconnect_changed()"
			/>
			<input
				type="button"
				id="disconnect"
				onclick="dropConnection()"
				value="Disconnect"
				disabled
			/>
			<br />
			<span id="state">Connecting</span> to: <a href="" target="_blank" id="target"></a>

			<h4>Module One Functions:</h4>
			<br />
			Amount:
			<input
				type="edit"
				value="5"
				id="amount"
				size="1"
			/>
			Delay:
			<input
				type="edit"
				value="1000"
				id="delay"
				size="4"
			/>
			<input
				type="button"
				onclick="getEvents()"
				value="Get events"
			/>
			<br />
			<h4>Module Two Functions:</h4>
			Enabled:
			<input
				type="checkbox"
				id="enabled"
			/>
			Username:
			<input
				type="edit"
				id="username"
				size="20"
			/>
			<input
				type="button"
				onclick="getSettings()"
				value="Get settings"
			/>
			<input
				type="button"
				onclick="setSettings()"
				value="Set settings"
			/>

			<h4>Log:</h4>
			<div id="result"></div>
			<input
				type="button"
				id="clear"
				onclick="clearLog()"
				value="Clear log"
				disabled
			/>
			Log level:
			<select id="loglevel" onchange="loglevel_changed()">
				<option value="1">Error only</option>
				<option value="2">Error &amp; Warning</option>
				<option value="3">Error &amp; Warning &amp; Info</option>
				<option value="4">Error &amp; Warning &amp; Info &amp; Debug</option>
				<option value="0">Disabled</option>
			</select>
		</form>
	</body>
</html>
